syntax = "proto3";

package identity.v1;

option go_package = "github.com/framecast/framecast-api-contracts/gen/go/identity/v1;identityv1";

// AccountVerificationRequested is emitted when a user starts sign-up and must
// confirm ownership of their email before the account is created. Consumed by
// the notification service, which sends the verification email. Fired before
// the user row exists — carries no user id yet.
message AccountVerificationRequested {
  string email = 1;
  // Full confirmation URL the user clicks (callback + opaque token).
  string verification_link = 2;
}

// UserRegistered is emitted after the user confirmed their email and the
// account was persisted — the canonical "a new user exists" fact. Consumed by
// the profile/metadata service (to create a profile row), analytics, and the
// welcome-email flow.
message UserRegistered {
  string user_id = 1;
  string email = 2;
}

// PasswordResetRequested is emitted when a user asks to reset a forgotten
// password. Consumed by the notification service, which sends the reset email.
message PasswordResetRequested {
  string email = 1;
  // Full reset URL the user clicks (callback + opaque single-use token).
  string reset_link = 2;
}

// LoginLinkRequested is emitted when a user asks for a passwordless login link
// (also rendered as a QR code by the client — same one-time token). Consumed by
// the notification service, which sends the login email.
message LoginLinkRequested {
  string email = 1;
  // Full login URL the user clicks/scans (callback + opaque single-use token).
  string login_link = 2;
}

// ExternalIdentityLinked is emitted when an external (SSO/OIDC) identity is
// attached to a user — both when the SSO sign-in created the account and when
// it linked to an existing one (matched by a provider-verified email). Fired
// once per (provider, subject); a repeat SSO login of an already-linked
// identity does not re-emit it. Consumed by the profile/metadata service (the
// only place a provider display name surfaces, since the identity service
// stores no profile data) and analytics.
message ExternalIdentityLinked {
  string user_id = 1;
  // OIDC provider key, e.g. "google".
  string provider = 2;
  // Provider-verified email captured at link time.
  string email = 3;
  // Provider profile name; may be empty if the provider supplied none.
  string display_name = 4;
  // True when this link also created the account; false when it attached to an
  // existing user. Lets a consumer create-vs-update without correlating events.
  bool new_user = 5;
}
