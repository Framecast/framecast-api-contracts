version: v2
modules:
  - path: proto
lint:
  use:
    - STANDARD
  except:
    # JobStream is a bidirectional stream — WorkerMessage / MpsMessage envelope
    # names communicate direction better than Request / Response.
    - RPC_REQUEST_STANDARD_NAME
    - RPC_RESPONSE_STANDARD_NAME
    - RPC_REQUEST_RESPONSE_UNIQUE
breaking:
  use:
    - FILE
