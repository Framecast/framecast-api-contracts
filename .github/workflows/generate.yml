name: Generate

on:
  push:
    branches: [main]
    paths:
      - 'proto/**'
      - 'buf.gen.yaml'
      - '.github/gen-templates/**'
      - '.github/workflows/generate.yml'
  workflow_dispatch:

env:
  # Opt into Node.js 24 for all actions before the June 2026 forced migration.
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      # Generate a short-lived token from the Framecast bot GitHub App.
      # Required secrets: BOT_APP_ID, BOT_PRIVATE_KEY
      # The push in the commit step must come from this App so the branch
      # protection bypass rule applies.
      - uses: actions/create-github-app-token@v1
        id: app-token
        with:
          app-id: ${{ secrets.BOT_APP_ID }}
          private-key: ${{ secrets.BOT_PRIVATE_KEY }}

      - uses: actions/checkout@v4
        with:
          token: ${{ steps.app-token.outputs.token }}

      - uses: bufbuild/buf-action@v1
        with:
          setup_only: true

      - name: Prepare package scaffolding
        run: |
          mkdir -p gen/go gen/rust/src
          cp .github/gen-templates/go.mod gen/go/go.mod
          cp .github/gen-templates/Cargo.toml gen/rust/Cargo.toml
          cp .github/gen-templates/lib.rs gen/rust/src/lib.rs

      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Generate
        run: buf generate

      - name: Tidy Go module
        run: cd gen/go && go mod tidy

      - name: Commit generated code
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: regenerate from proto"
          file_pattern: "gen/**"
          commit_user_name: "${{ steps.app-token.outputs.app-slug }}[bot]"
          commit_user_email: "${{ steps.app-token.outputs.app-slug }}[bot]@users.noreply.github.com"
